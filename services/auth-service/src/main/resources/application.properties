spring.application.name=auth-service
server.port=${SERVER_PORT:8091}


spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/url_auth_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:yash8252}

spring.datasource.driver-class-name=org.postgresql.Driver


spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false


spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

eureka.client.service-url.defaultZone=${EUREKA_SERVER:http://localhost:8761/eureka}

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always

management.metrics.tags.application=${spring.application.name}
management.prometheus.metrics.export.enabled=true

management.metrics.enable.hikaricp=true


logging.level.root=INFO
logging.level.org.springframework.security=INFO
logging.level.com.yashdotdev.auth=DEBUG

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui


spring.jackson.default-property-inclusion=non_null



server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s


spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000


# JWT

jwt.secret-key=ThisIsMyVeryLongSecretKeyForDistributedUrlShortenerApplication123456789

jwt.access-token-expiration=900000

jwt.refresh-token-expiration=604800000