spring.application.name=auth-service
server.port=${SERVER_PORT:8081}


spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/url_auth_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:yash8252}

spring.datasource.driver-class-name=org.postgresql.Driver


spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false


spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

eureka.client.service-url.defaultZone=${EUREKA_SERVER:http://localhost:8761/eureka}

eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always


logging.level.root=INFO
logging.level.org.springframework.security=INFO
logging.level.com.yashdotdev.auth=DEBUG

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui

jwt.private-key-path=classpath:keys/private.pem
jwt.public-key-path=classpath:keys/public.pem

jwt.access-token-validity=900
jwt.refresh-token-validity=604800

spring.jackson.default-property-inclusion=non_null



server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s